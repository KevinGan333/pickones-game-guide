# Nginx reverse proxy for PickOnes (www.pickones.com)
# Place this file at /etc/nginx/sites-available/pickones-game-guide
# Then: ln -s /etc/nginx/sites-available/pickones-game-guide /etc/nginx/sites-enabled/
# Test:  nginx -t
# Reload: systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.pickones.com pickones.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.pickones.com$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pickones.com;

    # SSL certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/www.pickones.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pickones.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Reverse proxy to Next.js (PM2 on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static assets — allow direct serving with caching
    location /_next/static {
        alias /var/www/pickones-game-guide/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /public {
        alias /var/www/pickones-game-guide/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # pickones.com → www.pickones.com canonical redirect
    if ($host = "pickones.com") {
        return 301 https://www.pickones.com$request_uri;
    }
}

# pickones.com HTTPS → www canonical
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pickones.com;

    ssl_certificate     /etc/letsencrypt/live/www.pickones.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pickones.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.pickones.com$request_uri;
}
