<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F08A24"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized game controller / D-pad with star -->
  <g transform="translate(10, 8)">
    <!-- Outer rounded square -->
    <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#logoGrad)"/>

    <!-- D-pad cross shape -->
    <rect x="36" y="20" width="28" height="60" rx="6" fill="#fff7ed"/>
    <rect x="20" y="36" width="60" height="28" rx="6" fill="#fff7ed"/>

    <!-- Center circle -->
    <circle cx="50" cy="50" r="10" fill="#F08A24"/>

    <!-- Small star accent top-right -->
    <g transform="translate(74, 18) scale(0.8)">
      <polygon points="0,-18 4,-6 17,-6 7,2 10,14 0,7 -10,14 -7,2 -17,-6 -4,-6" fill="#fff7ed"/>
    </g>
  </g>

  <!-- Text: PickOnes -->
  <g transform="translate(128, 0)">
    <!-- Main title -->
    <text x="0" y="62" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#2b1608" letter-spacing="-1">
      PickOnes
    </text>

    <!-- Subtitle -->
    <text x="4" y="90" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#F08A24" letter-spacing="4.5" text-transform="uppercase">
      GAME GUIDE
    </text>
  </g>
</svg>
