# ============================================================
# Nginx — PickONEs STAGING (staging.pickones.com)
# ============================================================
# Place: /etc/nginx/sites-available/pickones-staging
# Enable: ln -s /etc/nginx/sites-available/pickones-staging /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

# ----- HTTP → HTTPS redirect -----
server {
    listen 80;
    listen [::]:80;
    server_name staging.pickones.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://staging.pickones.com$request_uri;
    }
}

# ----- HTTPS -----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.pickones.com;

    # SSL (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/staging.pickones.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.pickones.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Reverse proxy → Next.js (PM2 on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static asset caching
    location /_next/static {
        alias /var/www/staging.pickones.com/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /public {
        alias /var/www/staging.pickones.com/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Staging access control (optional — uncomment to restrict)
    # auth_basic "Staging";
    # auth_basic_user_file /etc/nginx/.htpasswd;
}
